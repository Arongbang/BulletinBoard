server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router SPA fallback — must come before /api
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to Spring Boot backend.
    # This makes the browser see everything as same-origin (no CORS needed).
    location /api {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Forward cookies so Spring session auth works through the proxy
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;
    }
}
